name: Deploy to central

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.11.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/gradle.yml

  build-native:
    uses: ./.github/workflows/build-native-libs.yml
    with:
      version: ${{ inputs.version }}

  deploy:
    needs: [build, build-native]
    runs-on: macos-14

    env:
      VERSION: ${{ inputs.version }}
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.OSSRH_GPG_SECRET_KEY_ID }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}

    steps:
    - uses: actions/checkout@v6

    - name: Validate Gradle Wrapper
      uses: gradle/wrapper-validation-action@v3

    - uses: actions/cache@v5
      with:
        path: |
          ~/.konan
        key: ${{ runner.os }}-${{ hashFiles('**/.lock') }}

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download macOS native libs
      uses: actions/download-artifact@v4
      with:
        name: native-libs-macos
        path: calf-file-picker/src/desktopMain/resources/

    - name: Download Windows native libs
      uses: actions/download-artifact@v4
      with:
        name: native-libs-windows
        path: calf-file-picker/src/desktopMain/resources/

    - name: Download Linux native libs
      uses: actions/download-artifact@v4
      with:
        name: native-libs-linux
        path: calf-file-picker/src/desktopMain/resources/

    - name: Download macOS native libs (share)
      uses: actions/download-artifact@v4
      with:
        name: native-libs-macos
        path: calf-share/src/desktopMain/resources/

    - name: Download Windows native libs (share)
      uses: actions/download-artifact@v4
      with:
        name: native-libs-windows
        path: calf-share/src/desktopMain/resources/

    - name: Download Linux native libs (share)
      uses: actions/download-artifact@v4
      with:
        name: native-libs-linux
        path: calf-share/src/desktopMain/resources/

    - name: Verify native libs
      run: |
        ls -lhR calf-file-picker/src/desktopMain/resources/native/
        ls -lhR calf-share/src/desktopMain/resources/native/

    - name: Setup gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-darwin

    - name: Publish to Maven Central
      run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
