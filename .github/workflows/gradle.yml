# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v6

    - name: Validate Gradle Wrapper
      uses: gradle/wrapper-validation-action@v3

    - uses: actions/cache@v5
      with:
        path: |
          ~/.konan
        key: ${{ runner.os }}-${{ hashFiles('**/.lock') }}

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-darwin

    - name: Cache Rust
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          calf-file-picker/native/target
        key: rust-macos-${{ hashFiles('calf-file-picker/native/Cargo.toml') }}
        restore-keys: rust-macos-

    - name: Setup gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Gradle test
      run: ./gradlew allTests

  build-native:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/build-native-libs.yml

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, build-native]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Download macOS native libs
        uses: actions/download-artifact@v8
        with:
          name: native-libs-macos
          path: calf-file-picker/src/desktopMain/resources/

      - name: Download Windows native libs
        uses: actions/download-artifact@v8
        with:
          name: native-libs-windows
          path: calf-file-picker/src/desktopMain/resources/

      - name: Download Linux native libs
        uses: actions/download-artifact@v8
        with:
          name: native-libs-linux
          path: calf-file-picker/src/desktopMain/resources/

      - name: Verify native libs
        run: ls -lhR calf-file-picker/src/desktopMain/resources/native/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Deploy snapshot
        env:
          VERSION: 0.11.0-SNAPSHOT
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.OSSRH_GPG_SECRET_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
